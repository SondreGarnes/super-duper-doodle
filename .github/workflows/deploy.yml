name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: ghcr.io/sondregarnes/super-duper-doodle-frontend
  BACKEND_IMAGE: ghcr.io/sondregarnes/super-duper-doodle-backend

jobs:
  build-and-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy to cluster
        run: |
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/backend
