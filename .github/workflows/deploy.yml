name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: ghcr.io/sondregarnes/super-duper-doodle-frontend
  BACKEND_IMAGE: ghcr.io/sondregarnes/super-duper-doodle-backend
  POSTGRES_IMAGE: ghcr.io/sondregarnes/super-duper-doodle-postgres

jobs:
  build-and-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if postgres image exists
        id: check-postgres
        run: |
          if docker manifest inspect ${{ env.POSTGRES_IMAGE }}:latest > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push postgres
        if: steps.check-postgres.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./postgres
          push: true
          tags: ${{ env.POSTGRES_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Create app secret in cluster
        run: |
          kubectl create secret generic app-secret \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Deploy to cluster
        run: |
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/backend
